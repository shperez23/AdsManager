<div class="min-h-screen bg-slate-950 text-slate-100">
  <div class="flex min-h-screen">
    <aside class="hidden w-72 flex-col border-r border-white/10 bg-slate-900/80 px-5 py-6 backdrop-blur-xl lg:flex">
      <div class="mb-8 flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-indigo-400 to-cyan-400 font-bold text-slate-900">
          AM
        </div>
        <div>
          <p class="text-xs uppercase tracking-[0.25em] text-slate-400">Ads Manager</p>
          <p class="text-sm font-semibold text-white">Growth Workspace</p>
        </div>
      </div>

      <nav class="space-y-2">
        <a
          *ngFor="let item of navigationItems"
          [routerLink]="item.route"
          routerLinkActive="border-indigo-400/40 bg-indigo-500/15 text-white"
          [routerLinkActiveOptions]="{ exact: item.route === '/' }"
          class="group block rounded-2xl border border-transparent px-4 py-3 transition hover:border-white/10 hover:bg-white/5"
        >
          <p class="text-sm font-medium">{{ item.label }}</p>
          <p class="text-xs text-slate-400 group-hover:text-slate-300">{{ item.description }}</p>
        </a>
      </nav>

      <div class="mt-auto rounded-2xl border border-white/10 bg-white/5 p-4">
        <p class="text-xs uppercase tracking-wider text-slate-400">Usage</p>
        <p class="mt-2 text-sm font-medium text-white">82% budget health</p>
        <div class="mt-3 h-2 overflow-hidden rounded-full bg-slate-800">
          <div class="h-full w-4/5 rounded-full bg-gradient-to-r from-indigo-400 to-cyan-300"></div>
        </div>
      </div>
    </aside>

    <div class="flex min-h-screen flex-1 flex-col">
      <header class="sticky top-0 z-20 border-b border-white/10 bg-slate-950/70 px-4 py-4 backdrop-blur-xl sm:px-6 lg:px-10">
        <div class="flex items-center justify-between gap-3">
          <div>
            <p class="text-xs uppercase tracking-[0.2em] text-slate-400">Performance dashboard</p>
            <h1 class="text-xl font-semibold text-white sm:text-2xl">Campaign Intelligence Hub</h1>
          </div>
          <button
            type="button"
            class="rounded-xl border border-white/15 bg-white/5 px-4 py-2 text-sm font-medium text-slate-200 transition hover:bg-white/10"
          >
            New campaign
          </button>
        </div>
      </header>

      <main class="flex-1 px-4 py-6 sm:px-6 lg:px-10">
        <div class="rounded-3xl border border-white/10 bg-slate-900/70 p-4 shadow-2xl shadow-slate-950/30 sm:p-6 lg:p-8">
          <router-outlet></router-outlet>
        </div>
      </main>
    </div>
  </div>
</div>
