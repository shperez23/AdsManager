<div class="min-h-screen bg-slate-950 text-slate-100">
  <div class="flex min-h-screen">
    <aside class="hidden w-72 flex-col border-r border-white/10 bg-slate-900/80 px-5 py-6 backdrop-blur-xl lg:flex">
      <div class="mb-8 flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-indigo-400 to-cyan-400 font-bold text-slate-900">
          AM
        </div>
        <div>
          <p class="text-xs uppercase tracking-[0.25em] text-slate-400">Ads Manager</p>
          <p class="text-sm font-semibold text-white">Growth Workspace</p>
        </div>
      </div>

      <nav class="space-y-2">
        <a
          *ngFor="let item of navigationItems"
          [routerLink]="item.route"
          routerLinkActive="border-indigo-400/50 bg-indigo-500/20 text-white shadow-lg shadow-indigo-900/20"
          [routerLinkActiveOptions]="{ exact: item.route === '/' }"
          class="group flex items-center justify-between rounded-2xl border border-transparent px-4 py-3 text-sm font-medium text-slate-300 transition hover:border-white/10 hover:bg-white/5 hover:text-white"
        >
          <span class="flex items-center gap-2"><span>{{ item.icon }}</span>{{ item.label }}</span>
          <span class="rounded-lg border border-white/10 bg-white/5 px-2 py-0.5 text-[10px] uppercase tracking-wider text-slate-400">go</span>
        </a>
      </nav>

      <div class="mt-auto rounded-2xl border border-white/10 bg-white/5 p-4">
        <p class="text-xs uppercase tracking-wider text-slate-400">Usage</p>
        <p class="mt-2 text-sm font-medium text-white">82% budget health</p>
        <div class="mt-3 h-2 overflow-hidden rounded-full bg-slate-800">
          <div class="h-full w-4/5 rounded-full bg-gradient-to-r from-indigo-400 to-cyan-300"></div>
        </div>
      </div>
    </aside>

    <div class="flex min-h-screen flex-1 flex-col">
      <header class="sticky top-0 z-20 border-b border-white/10 bg-slate-950/70 px-4 py-4 backdrop-blur-xl sm:px-6 lg:px-10">
        <div class="flex flex-wrap items-center justify-between gap-4 rounded-2xl border border-white/10 bg-slate-900/70 px-4 py-3">
          <div class="flex items-center gap-3">
            <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-indigo-400 to-cyan-400 text-sm font-bold text-slate-900">
              AM
            </div>
            <div>
              <p class="text-xs uppercase tracking-[0.2em] text-slate-400">Performance dashboard</p>
              <h1 class="text-lg font-semibold text-white sm:text-xl">Campaign Intelligence Hub</h1>
            </div>
          </div>

          <div class="order-3 w-full sm:order-2 sm:w-auto sm:min-w-80">
            <label class="relative block">
              <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">🔍</span>
              <input
                type="search"
                placeholder="Buscar campañas, cuentas o anuncios..."
                class="w-full rounded-xl border border-white/10 bg-slate-950/70 py-2 pl-10 pr-3 text-sm text-slate-100 outline-none transition placeholder:text-slate-500 focus:border-indigo-400/60"
              />
            </label>
          </div>

          <div class="order-2 flex items-center gap-2 sm:order-3">
            <button
              type="button"
              aria-label="Notificaciones"
              class="relative rounded-xl border border-white/10 bg-white/5 p-2.5 text-slate-200 transition hover:bg-white/10"
            >
              🔔
              <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-rose-400"></span>
            </button>
            <div class="flex items-center gap-2 rounded-xl border border-white/10 bg-white/5 px-2 py-1.5">
              <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-500/30 text-xs font-semibold text-indigo-200">AR</div>
              <div class="hidden text-left sm:block">
                <p class="text-sm font-medium text-white">Alex Rivera</p>
                <p class="text-xs text-slate-400">Performance Lead</p>
              </div>
            </div>
          </div>
        </div>

        <nav class="mt-4 flex gap-2 overflow-x-auto pb-1 lg:hidden">
          <a
            *ngFor="let item of navigationItems"
            [routerLink]="item.route"
            routerLinkActive="border-indigo-400/60 bg-indigo-500/20 text-white"
            [routerLinkActiveOptions]="{ exact: item.route === '/' }"
            class="shrink-0 rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-sm text-slate-300"
          >
            {{ item.icon }} {{ item.label }}
          </a>
        </nav>
      </header>

      <main class="flex-1 px-4 py-6 sm:px-6 lg:px-10">
        <div class="rounded-3xl border border-white/10 bg-slate-900/70 p-4 shadow-2xl shadow-slate-950/30 sm:p-6 lg:p-8">
          <router-outlet></router-outlet>
        </div>
      </main>
    </div>
  </div>
</div>

<app-toast-container></app-toast-container>
