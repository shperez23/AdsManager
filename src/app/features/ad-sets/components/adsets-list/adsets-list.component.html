<section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm sm:p-6">
  <div class="mb-4 flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
    <h2 class="text-lg font-semibold text-slate-900">Conjuntos de anuncios</h2>

    <div class="grid gap-2 md:grid-cols-2 xl:grid-cols-5">
      <input
        type="search"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        placeholder="Buscar por nombre"
        [ngModel]="searchTerm"
        (ngModelChange)="onSearchChange($event)"
      />

      <input
        type="search"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        placeholder="Filtrar por ID de campaña"
        [ngModel]="campaignIdFilter"
        (ngModelChange)="onCampaignIdChange($event)"
      />

      <select
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        [ngModel]="selectedStatus"
        (ngModelChange)="onStatusChange($event)"
      >
        <option *ngFor="let status of statusOptions" [value]="status">
          {{ status === 'ALL' ? 'Todos los estados' : status }}
        </option>
      </select>

      <select
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        [ngModel]="selectedSortBy"
        (ngModelChange)="onSortByChange($event)"
      >
        <option *ngFor="let sortField of sortFieldOptions" [value]="sortField.value">
          {{ sortField.label }}
        </option>
      </select>

      <div class="grid grid-cols-2 gap-2">
        <select
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
          [ngModel]="selectedSortDirection"
          (ngModelChange)="onSortDirectionChange($event)"
          [disabled]="!selectedSortBy"
        >
          <option *ngFor="let sortDirection of sortDirectionOptions" [value]="sortDirection.value">
            {{ sortDirection.label }}
          </option>
        </select>

        <select
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
          [ngModel]="selectedPageSize"
          (ngModelChange)="onPageSizeChange($event)"
        >
          <option *ngFor="let size of pageSizeOptions" [value]="size">{{ size }} por página</option>
        </select>
      </div>
    </div>
  </div>

  <app-error-state
    *ngIf="errorMessage"
    class="mb-4 block"
    [message]="errorMessage"
    [showRetry]="true"
    (retry)="onRetry()"
  ></app-error-state>

  <div class="overflow-x-auto rounded-lg border border-slate-200">
    <table class="min-w-full divide-y divide-slate-200 text-sm">
      <thead class="bg-slate-50">
        <tr>
          <th class="px-4 py-3 text-left font-semibold text-slate-700">Nombre</th>
          <th class="px-4 py-3 text-left font-semibold text-slate-700">Estado</th>
          <th class="px-4 py-3 text-left font-semibold text-slate-700">ID de campaña</th>
          <th class="px-4 py-3 text-left font-semibold text-slate-700">Presupuesto diario</th>
          <th class="px-4 py-3 text-left font-semibold text-slate-700">Acciones</th>
        </tr>
      </thead>

      <tbody class="divide-y divide-slate-200 bg-white">
        <tr *ngIf="isLoading">
          <td colspan="5" class="px-4 py-6 text-center text-slate-500">
            <app-loading-state message="Cargando conjuntos de anuncios..."></app-loading-state>
          </td>
        </tr>

        <tr *ngIf="!isLoading && adSets.length === 0">
          <td colspan="5" class="px-4 py-6 text-center text-slate-500">
            <app-empty-state></app-empty-state>
          </td>
        </tr>

        <tr *ngFor="let adSet of adSets; trackBy: trackByAdSet" class="hover:bg-slate-50">
          <td class="whitespace-nowrap px-4 py-3 text-slate-900">{{ adSet.name }}</td>
          <td class="whitespace-nowrap px-4 py-3">
            <span
              class="inline-flex rounded-full px-2 py-1 text-xs font-medium"
              [ngClass]="{
                'bg-emerald-100 text-emerald-700': adSet.status === 'ACTIVE',
                'bg-amber-100 text-amber-700': adSet.status === 'PAUSED',
                'bg-slate-200 text-slate-700':
                  adSet.status !== 'ACTIVE' && adSet.status !== 'PAUSED',
              }"
            >
              {{ adSet.status }}
            </span>
          </td>
          <td class="whitespace-nowrap px-4 py-3 text-slate-700">{{ adSet.campaignId }}</td>
          <td class="whitespace-nowrap px-4 py-3 text-slate-700">
            {{ getDisplayBudget(adSet) | currency: 'USD' : 'symbol' : '1.0-0' }}
          </td>
          <td class="whitespace-nowrap px-4 py-3">
            <div class="flex flex-wrap gap-2">
              <button
                type="button"
                class="rounded-md border border-blue-300 px-3 py-1.5 text-xs font-medium text-blue-700 transition hover:bg-blue-50 disabled:cursor-not-allowed disabled:opacity-60"
                [disabled]="actionAdSetId === adSet.id"
                (click)="onToggleStatus(adSet)"
              >
                {{
                  actionAdSetId === adSet.id
                    ? 'Procesando...'
                    : adSet.status === 'ACTIVE'
                      ? 'Pausar'
                      : 'Activar'
                }}
              </button>
              <button
                type="button"
                class="rounded-md border border-slate-300 px-3 py-1.5 text-xs font-medium text-slate-700 transition hover:bg-slate-100"
                (click)="onEdit(adSet)"
              >
                Editar
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="mt-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
    <p class="text-sm text-slate-600">Total: {{ totalItems }} registros</p>

    <div class="flex items-center gap-1">
      <button
        type="button"
        class="rounded-md border border-slate-300 px-3 py-1.5 text-xs font-medium text-slate-700 transition hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="currentPage <= 1"
        (click)="onPageChange(currentPage - 1)"
      >
        Anterior
      </button>

      <ng-container *ngFor="let page of pageNumbers">
        <button
          type="button"
          class="rounded-md border px-3 py-1.5 text-xs font-medium transition"
          [ngClass]="
            page === currentPage
              ? 'border-blue-600 bg-blue-600 text-white'
              : 'border-slate-300 text-slate-700 hover:bg-slate-100'
          "
          (click)="onPageChange(page)"
        >
          {{ page }}
        </button>
      </ng-container>

      <button
        type="button"
        class="rounded-md border border-slate-300 px-3 py-1.5 text-xs font-medium text-slate-700 transition hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="currentPage >= totalPages"
        (click)="onPageChange(currentPage + 1)"
      >
        Siguiente
      </button>
    </div>
  </div>
</section>
