<div class="space-y-4">
  <section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm sm:p-6">
    <h2 class="mb-4 text-lg font-semibold text-slate-900">{{ selectedAdSet ? 'Editar ad set' : 'Crear ad set' }}</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid gap-3 sm:grid-cols-2">
      <label class="flex flex-col gap-1 text-xs font-medium text-slate-700">
        Campaign ID
        <input formControlName="campaignId" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal" placeholder="Campaign ID" [readonly]="!!selectedAdSet" />
      </label>

      <label class="flex flex-col gap-1 text-xs font-medium text-slate-700">
        Estado
        <select formControlName="status" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal">
          <option value="ACTIVE">ACTIVE</option>
          <option value="PAUSED">PAUSED</option>
          <option value="DISABLED">DISABLED</option>
        </select>
      </label>

      <label class="flex flex-col gap-1 text-xs font-medium text-slate-700 sm:col-span-2">
        Nombre
        <input formControlName="name" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal" placeholder="Nombre" />
      </label>

      <label class="flex flex-col gap-1 text-xs font-medium text-slate-700">
        {{ selectedAdSet ? 'Budget' : 'Daily budget' }}
        <input formControlName="dailyBudget" type="number" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal" />
      </label>

      <label class="flex flex-col gap-1 text-xs font-medium text-slate-700">
        Billing event
        <input formControlName="billingEvent" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal" placeholder="IMPRESSIONS" />
      </label>

      <label class="flex flex-col gap-1 text-xs font-medium text-slate-700">
        Optimization goal
        <input formControlName="optimizationGoal" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal" placeholder="REACH" />
      </label>

      <label class="flex flex-col gap-1 text-xs font-medium text-slate-700">
        Bid strategy
        <input formControlName="bidStrategy" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal" placeholder="LOWEST_COST" />
      </label>

      <label class="flex flex-col gap-1 text-xs font-medium text-slate-700 sm:col-span-2">
        Targeting JSON
        <textarea formControlName="targetingJson" rows="3" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal" placeholder='{"geo_locations": {}}'></textarea>
      </label>

      <ng-container *ngIf="selectedAdSet">
        <label class="flex flex-col gap-1 text-xs font-medium text-slate-700">
          Start date
          <input formControlName="startDate" type="datetime-local" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal" />
        </label>

        <label class="flex flex-col gap-1 text-xs font-medium text-slate-700">
          End date
          <input formControlName="endDate" type="datetime-local" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal" />
        </label>
      </ng-container>

      <div class="sm:col-span-2">
        <button class="rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white disabled:opacity-60" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Guardando...' : selectedAdSet ? 'Actualizar' : 'Crear' }}
        </button>
      </div>
    </form>
  </section>

  <app-adsets-list [reloadKey]="reloadKey" (editAdSet)="onEditAdSet($event)"></app-adsets-list>
</div>
