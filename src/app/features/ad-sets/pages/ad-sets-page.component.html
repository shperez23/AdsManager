<div class="space-y-4">
  <section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm sm:p-6">
    <h2 class="mb-4 text-lg font-semibold text-slate-900">{{ selectedAdSet ? 'Editar ad set' : 'Crear ad set' }}</h2>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid gap-3 sm:grid-cols-2">
      <input formControlName="campaignId" class="rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="Campaign ID" />
      <input formControlName="name" class="rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="Nombre" />
      <select formControlName="status" class="rounded-lg border border-slate-300 px-3 py-2 text-sm">
        <option value="ACTIVE">ACTIVE</option>
        <option value="PAUSED">PAUSED</option>
        <option value="DISABLED">DISABLED</option>
      </select>
      <input formControlName="dailyBudget" type="number" class="rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="Daily budget" />
      <div class="sm:col-span-2">
        <button class="rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Guardando...' : selectedAdSet ? 'Actualizar' : 'Crear' }}
        </button>
      </div>
    </form>
  </section>

  <app-adsets-list (editAdSet)="onEditAdSet($event)"></app-adsets-list>
</div>
