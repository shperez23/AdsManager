<section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm sm:p-6">
  <div class="mb-4 flex flex-wrap items-start justify-between gap-3">
    <div>
      <h2 class="text-lg font-semibold text-slate-900">
        {{ isEditMode ? 'Editar regla' : 'Crear regla' }}
      </h2>
      <p class="text-xs text-slate-500">
        Configura reglas automáticas usando los enums y contratos definidos en Swagger.
      </p>
    </div>

    <button
      *ngIf="isEditMode"
      type="button"
      class="rounded-md border border-slate-300 px-3 py-2 text-xs font-medium text-slate-700 transition hover:bg-slate-50"
      (click)="onCancel()"
    >
      Cancelar edición
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid gap-4 sm:grid-cols-2">
    <label class="flex flex-col gap-1 text-xs font-medium text-slate-700 sm:col-span-2">
      Nombre de la regla
      <input
        formControlName="name"
        class="rounded-lg border px-3 py-2 text-sm font-normal outline-none transition"
        [class.border-red-300]="form.controls.name.touched && form.controls.name.invalid"
        [class.border-slate-300]="!form.controls.name.touched || form.controls.name.valid"
        placeholder="Ej. Pausar campañas con CTR bajo"
      />
      <span *ngIf="hasError('name', 'required')" class="text-[11px] text-red-600"
        >El nombre es obligatorio.</span
      >
      <span *ngIf="hasError('name', 'minlength')" class="text-[11px] text-red-600"
        >Debe tener al menos 3 caracteres.</span
      >
      <span *ngIf="hasError('name', 'maxlength')" class="text-[11px] text-red-600"
        >No puede superar 120 caracteres.</span
      >
    </label>

    <label class="flex flex-col gap-1 text-xs font-medium text-slate-700">
      Nivel de entidad
      <select
        formControlName="entityLevel"
        class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal"
      >
        <option *ngFor="let option of entityLevelOptions" [ngValue]="option.value">
          {{ option.label }}
        </option>
      </select>
    </label>

    <label class="flex flex-col gap-1 text-xs font-medium text-slate-700">
      Métrica
      <select
        formControlName="metric"
        class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal"
      >
        <option *ngFor="let option of metricOptions" [ngValue]="option.value">
          {{ option.label }}
        </option>
      </select>
    </label>

    <label class="flex flex-col gap-1 text-xs font-medium text-slate-700">
      Operador
      <select
        formControlName="operator"
        class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal"
      >
        <option *ngFor="let option of operatorOptions" [ngValue]="option.value">
          {{ option.label }}
        </option>
      </select>
    </label>

    <label class="flex flex-col gap-1 text-xs font-medium text-slate-700">
      Acción
      <select
        formControlName="action"
        class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal"
      >
        <option *ngFor="let option of actionOptions" [ngValue]="option.value">
          {{ option.label }}
        </option>
      </select>
    </label>

    <label class="flex flex-col gap-1 text-xs font-medium text-slate-700">
      Threshold
      <input
        formControlName="threshold"
        type="number"
        min="0.01"
        step="0.01"
        class="rounded-lg border px-3 py-2 text-sm font-normal outline-none transition"
        [class.border-red-300]="form.controls.threshold.touched && form.controls.threshold.invalid"
        [class.border-slate-300]="!form.controls.threshold.touched || form.controls.threshold.valid"
        placeholder="0.00"
      />
      <span *ngIf="hasError('threshold', 'required')" class="text-[11px] text-red-600"
        >El threshold es obligatorio.</span
      >
      <span *ngIf="hasError('threshold', 'min')" class="text-[11px] text-red-600"
        >Debe ser mayor que 0.</span
      >
    </label>

    <label
      class="flex items-center gap-3 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700"
    >
      <input
        formControlName="isActive"
        type="checkbox"
        class="h-4 w-4 rounded border-slate-300 text-blue-600"
      />
      Crear o guardar la regla como activa
    </label>

    <div class="sm:col-span-2 flex flex-wrap gap-3">
      <button
        type="submit"
        class="rounded-md bg-blue-600 px-4 py-2 text-sm text-white transition disabled:cursor-not-allowed disabled:bg-blue-300"
        [disabled]="isSubmitting"
      >
        {{ isSubmitting ? 'Guardando...' : isEditMode ? 'Actualizar regla' : 'Crear regla' }}
      </button>

      <button
        *ngIf="isEditMode"
        type="button"
        class="rounded-md border border-slate-300 px-4 py-2 text-sm text-slate-700 transition hover:bg-slate-50"
        (click)="onCancel()"
      >
        Limpiar selección
      </button>
    </div>
  </form>
</section>
