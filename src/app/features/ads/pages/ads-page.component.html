<div class="space-y-4">
  <app-ads-form
    [ad]="selectedAd"
    [adSetOptions]="adSetOptions"
    [isLoadingAd]="isLoadingAd"
    [isLoadingAdSetOptions]="isLoadingAdSetOptions"
    [isSubmitting]="isSubmitting"
    (cancelEdit)="onCancelEdit()"
    (submitForm)="onSubmitForm($event)"
  ></app-ads-form>
  <app-ads-list [reloadKey]="reloadKey" (editAd)="onEditAd($event)"></app-ads-list>
</div>
