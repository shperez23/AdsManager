<section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm sm:p-6">
  <div class="mb-5 flex items-center justify-between">
    <h2 class="text-lg font-semibold text-slate-900">{{ isEditMode ? 'Editar ad' : 'Crear ad' }}</h2>
  </div>

  <form [formGroup]="adsForm" (ngSubmit)="onSubmit()" class="grid gap-4 sm:grid-cols-2">
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-700">AdSet ID</label>
      <input formControlName="adSetId" type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
    </div>

    <div>
      <label class="mb-1 block text-sm font-medium text-slate-700">Status</label>
      <select formControlName="status" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        <option *ngFor="let status of statusOptions" [value]="status">{{ status }}</option>
      </select>
    </div>

    <div class="sm:col-span-2">
      <label class="mb-1 block text-sm font-medium text-slate-700">Nombre</label>
      <input formControlName="name" type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
    </div>

    <div class="sm:col-span-2">
      <label class="mb-1 block text-sm font-medium text-slate-700">Creative JSON</label>
      <textarea formControlName="creativeJson" rows="3" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"></textarea>
    </div>

    <div class="sm:col-span-2">
      <label class="mb-1 block text-sm font-medium text-slate-700">Preview URL</label>
      <input formControlName="previewUrl" type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
    </div>

    <div class="sm:col-span-2 flex justify-end">
      <button
        type="submit"
        class="rounded-md border border-blue-600 bg-blue-600 px-4 py-2 text-sm font-medium text-white disabled:opacity-60"
        [disabled]="isSubmitting"
      >
        {{ isSubmitting ? 'Guardando...' : isEditMode ? 'Actualizar' : 'Crear' }}
      </button>
    </div>
  </form>
</section>
