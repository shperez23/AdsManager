<section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm sm:p-6">
  <div class="mb-5 flex items-center justify-between gap-3">
    <div>
      <h2 class="text-lg font-semibold text-slate-900">
        {{ isEditMode ? 'Editar ad' : 'Crear ad' }}
      </h2>
      <p class="mt-1 text-sm text-slate-500">
        {{
          isEditMode
            ? 'La edición carga el detalle real desde GET /ads/{id}.'
            : 'Selecciona un Ad Set real desde la API para evitar IDs manuales.'
        }}
      </p>
    </div>

    <button
      *ngIf="isEditMode"
      type="button"
      class="rounded-md border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
      (click)="cancelEdit.emit()"
    >
      Cancelar edición
    </button>
  </div>

  <div
    *ngIf="isLoadingAd"
    class="mb-4 rounded-lg border border-blue-100 bg-blue-50 px-4 py-3 text-sm text-blue-700"
  >
    Cargando detalle completo del ad...
  </div>

  <form [formGroup]="adsForm" (ngSubmit)="onSubmit()" class="grid gap-4 sm:grid-cols-2">
    <div class="sm:col-span-2">
      <label class="mb-1 block text-sm font-medium text-slate-700">Ad Set</label>
      <select
        formControlName="adSetId"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
        [disabled]="isEditMode || isLoadingAdSetOptions"
      >
        <option value="">
          {{ isLoadingAdSetOptions ? 'Cargando Ad Sets...' : 'Selecciona un Ad Set' }}
        </option>
        <option *ngFor="let adSet of adSetOptions" [value]="adSet.id">
          {{ adSet.name || adSet.id }} · {{ adSet.campaignId }}
        </option>
      </select>
      <p class="mt-1 text-xs text-slate-500" *ngIf="isEditMode">
        Solo informativo. Swagger no permite reenviar <code>adSetId</code> en update.
      </p>
    </div>

    <div>
      <label class="mb-1 block text-sm font-medium text-slate-700">Status</label>
      <select
        formControlName="status"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
      >
        <option *ngFor="let status of statusOptions" [value]="status">{{ status }}</option>
      </select>
    </div>

    <div class="sm:col-span-2">
      <label class="mb-1 block text-sm font-medium text-slate-700">Nombre</label>
      <input
        formControlName="name"
        type="text"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
      />
    </div>

    <div class="sm:col-span-2">
      <label class="mb-1 block text-sm font-medium text-slate-700">Creative JSON</label>
      <textarea
        formControlName="creativeJson"
        rows="3"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
      ></textarea>
    </div>

    <div class="sm:col-span-2">
      <label class="mb-1 block text-sm font-medium text-slate-700">Preview URL</label>
      <input
        formControlName="previewUrl"
        type="text"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
      />
    </div>

    <div class="sm:col-span-2 flex justify-end">
      <button
        type="submit"
        class="rounded-md border border-blue-600 bg-blue-600 px-4 py-2 text-sm font-medium text-white disabled:opacity-60"
        [disabled]="isSubmitting || isLoadingAd"
      >
        {{ isSubmitting ? 'Guardando...' : isEditMode ? 'Actualizar' : 'Crear' }}
      </button>
    </div>
  </form>
</section>
