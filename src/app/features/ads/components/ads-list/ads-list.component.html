<section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm sm:p-6">
  <div class="mb-4 flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
    <h2 class="text-lg font-semibold text-slate-900">Ads</h2>

    <div class="grid gap-2 sm:grid-cols-3">
      <input
        type="search"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        placeholder="Buscar por nombre"
        [ngModel]="searchTerm"
        (ngModelChange)="onSearchChange($event)"
      />

      <select
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        [ngModel]="selectedStatus"
        (ngModelChange)="onStatusChange($event)"
      >
        <option *ngFor="let status of statusOptions" [value]="status">
          {{ status === 'ALL' ? 'Todos los estados' : status }}
        </option>
      </select>

      <select
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        [ngModel]="selectedPageSize"
        (ngModelChange)="onPageSizeChange($event)"
      >
        <option *ngFor="let size of pageSizeOptions" [value]="size">
          {{ size }} por página
        </option>
      </select>
    </div>
  </div>

  <app-error-state
    *ngIf="errorMessage"
    class="mb-4 block"
    [message]="errorMessage"
    [showRetry]="true"
    (retry)="onRetry()"
  ></app-error-state>

  <div class="overflow-x-auto rounded-lg border border-slate-200">
    <table class="min-w-full divide-y divide-slate-200 text-sm">
      <thead class="bg-slate-50">
        <tr>
          <th class="px-4 py-3 text-left font-semibold text-slate-700">Nombre</th>
          <th class="px-4 py-3 text-left font-semibold text-slate-700">Status</th>
          <th class="px-4 py-3 text-left font-semibold text-slate-700">Ad Set</th>
          <th class="px-4 py-3 text-left font-semibold text-slate-700">Preview URL</th>
          <th class="px-4 py-3 text-left font-semibold text-slate-700">Acciones</th>
        </tr>
      </thead>

      <tbody class="divide-y divide-slate-200 bg-white">
        <tr *ngIf="isLoading">
          <td colspan="5" class="px-4 py-2">
            <app-loading-state message="Cargando anuncios..."></app-loading-state>
          </td>
        </tr>

        <tr *ngIf="!isLoading && ads.length === 0">
          <td colspan="5" class="px-4 py-2">
            <app-empty-state></app-empty-state>
          </td>
        </tr>

        <tr *ngFor="let ad of ads; trackBy: trackByAd" class="hover:bg-slate-50">
          <td class="px-4 py-3 text-slate-900">
            <span class="font-medium">{{ ad.name }}</span>
          </td>
          <td class="px-4 py-3">
            <span
              class="inline-flex rounded-full px-2 py-1 text-xs font-medium"
              [ngClass]="{
                'bg-emerald-100 text-emerald-700': ad.status === 'ACTIVE',
                'bg-amber-100 text-amber-700': ad.status === 'PAUSED',
                'bg-slate-200 text-slate-700': ad.status !== 'ACTIVE' && ad.status !== 'PAUSED'
              }"
            >
              {{ ad.status }}
            </span>
          </td>
          <td class="px-4 py-3 text-slate-700">{{ ad.adSetId || "—" }}</td>
          <td class="px-4 py-3 text-slate-700">{{ ad.previewUrl || "—" }}</td>
          <td class="px-4 py-3">
            <div class="flex items-center gap-2">
              <button
                type="button"
                class="rounded-md border border-blue-300 px-3 py-1.5 text-xs font-medium text-blue-700 transition hover:bg-blue-50 disabled:cursor-not-allowed disabled:opacity-60"
                [disabled]="isLoading"
                (click)="onToggleStatus(ad)"
              >
                {{ ad.status === 'ACTIVE' ? 'Pausar' : 'Activar' }}
              </button>

              <button
                type="button"
                class="rounded-md border border-indigo-300 px-3 py-1.5 text-xs font-medium text-indigo-700 transition hover:bg-indigo-50"
                (click)="onEdit(ad)"
              >
                Editar
              </button>

              <button
                type="button"
                class="rounded-md border border-indigo-300 px-3 py-1.5 text-xs font-medium text-indigo-700 transition hover:bg-indigo-50"
                (click)="onSelectInsights(ad.id)"
              >
                Insights
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="mt-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
    <p class="text-sm text-slate-600">Total: {{ totalItems }} registros</p>

    <div class="flex items-center gap-1">
      <button
        type="button"
        class="rounded-md border border-slate-300 px-3 py-1.5 text-xs font-medium text-slate-700 transition hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="currentPage <= 1"
        (click)="onPageChange(currentPage - 1)"
      >
        Anterior
      </button>

      <ng-container *ngFor="let page of pageNumbers">
        <button
          type="button"
          class="rounded-md border px-3 py-1.5 text-xs font-medium transition"
          [ngClass]="
            page === currentPage
              ? 'border-blue-600 bg-blue-600 text-white'
              : 'border-slate-300 text-slate-700 hover:bg-slate-100'
          "
          (click)="onPageChange(page)"
        >
          {{ page }}
        </button>
      </ng-container>

      <button
        type="button"
        class="rounded-md border border-slate-300 px-3 py-1.5 text-xs font-medium text-slate-700 transition hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="currentPage >= totalPages"
        (click)="onPageChange(currentPage + 1)"
      >
        Siguiente
      </button>
    </div>
  </div>
</section>

<div class="mt-5" *ngIf="selectedAdId as adId">
  <app-ad-insights-dashboard [adId]="adId"></app-ad-insights-dashboard>
</div>
