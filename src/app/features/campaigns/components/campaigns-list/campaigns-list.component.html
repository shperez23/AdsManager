<section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm sm:p-6">
  <h2 class="mb-3 text-lg font-semibold text-slate-900">Campaigns</h2>
  <p *ngIf="isLoading" class="text-sm text-slate-500">Cargando...</p>
  <div class="space-y-2" *ngIf="!isLoading">
    <article *ngFor="let campaign of campaigns" class="flex items-center justify-between rounded-lg border border-slate-200 p-3">
      <div>
        <p class="text-sm font-medium text-slate-900">{{ campaign.name }}</p>
        <p class="text-xs text-slate-500">{{ campaign.id }} · {{ campaign.status }}</p>
      </div>
      <div class="flex gap-2">
        <button class="rounded-md border border-slate-300 px-3 py-1 text-xs" (click)="onEdit(campaign)">Editar</button>
        <button class="rounded-md border border-blue-600 px-3 py-1 text-xs text-blue-700" (click)="onToggleStatus(campaign)">
          {{ campaign.status === 'ACTIVE' ? 'Pausar' : 'Activar' }}
        </button>
      </div>
    </article>
  </div>
</section>
