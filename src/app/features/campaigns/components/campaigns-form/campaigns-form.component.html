<section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm sm:p-6">
  <h2 class="mb-4 text-lg font-semibold text-slate-900">{{ isEditMode ? 'Editar campaign' : 'Crear campaign' }}</h2>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid gap-3 sm:grid-cols-2">
    <input formControlName="adAccountId" class="rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="Ad Account ID" />
    <select formControlName="status" class="rounded-lg border border-slate-300 px-3 py-2 text-sm">
      <option value="ACTIVE">ACTIVE</option>
      <option value="PAUSED">PAUSED</option>
    </select>
    <input formControlName="name" class="sm:col-span-2 rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="Nombre" />
    <button class="sm:col-span-2 rounded-md bg-blue-600 px-4 py-2 text-sm text-white" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Guardando...' : isEditMode ? 'Actualizar' : 'Crear' }}
    </button>
  </form>
</section>
