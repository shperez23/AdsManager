<div class="space-y-4">
  <section
    class="flex items-center justify-end rounded-xl border border-slate-200 bg-white p-4 shadow-sm"
  >
    <button
      type="button"
      class="rounded-md border border-blue-600 px-4 py-2 text-sm font-medium text-blue-700 transition hover:bg-blue-50 disabled:cursor-not-allowed disabled:opacity-60"
      [disabled]="isImporting"
      (click)="onImportFromMeta()"
    >
      {{ isImporting ? 'Importando...' : 'Import from Meta' }}
    </button>
  </section>

  <div class="grid gap-6 xl:grid-cols-[1.4fr,1fr]">
    <app-adaccounts-list
      [selectedAdAccountId]="selectedAdAccountId"
      [reloadKey]="reloadKey"
      (selectedAdAccountChange)="onSelectedAdAccountChange($event)"
    ></app-adaccounts-list>

    <app-adaccount-detail
      [adAccountId]="selectedAdAccountId"
      [adAccount]="selectedAdAccount"
    ></app-adaccount-detail>
  </div>
</div>
