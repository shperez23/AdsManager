<section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm sm:p-6">
  <div class="mb-4 flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
    <h2 class="text-lg font-semibold text-slate-900">Ad Accounts</h2>

    <div class="grid gap-2 sm:grid-cols-3">
      <input
        type="search"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        placeholder="Buscar por nombre"
        [ngModel]="searchTerm"
        (ngModelChange)="onSearchChange($event)"
      />

      <select
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        [ngModel]="selectedStatus"
        (ngModelChange)="onStatusChange($event)"
      >
        <option *ngFor="let status of statusOptions" [value]="status">
          {{ status === 'ALL' ? 'Todos los estados' : status }}
        </option>
      </select>

      <select
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        [ngModel]="selectedPageSize"
        (ngModelChange)="onPageSizeChange($event)"
      >
        <option *ngFor="let size of pageSizeOptions" [value]="size">
          {{ size }} por página
        </option>
      </select>
    </div>
  </div>

  <app-error-state
    *ngIf="errorMessage"
    class="mb-4 block"
    [message]="errorMessage"
    [showRetry]="true"
    (retry)="onRetry()"
  ></app-error-state>

  <div class="overflow-x-auto rounded-lg border border-slate-200">
    <table class="min-w-full divide-y divide-slate-200 text-sm">
      <thead class="bg-slate-50">
        <tr>
          <th class="px-4 py-3 text-left font-semibold text-slate-700">
            <button type="button" class="inline-flex items-center gap-1" (click)="onSort('name')">
              Nombre
              <span class="text-slate-500">{{ getSortIcon('name') }}</span>
            </button>
          </th>
          <th class="px-4 py-3 text-left font-semibold text-slate-700">
            <button type="button" class="inline-flex items-center gap-1" (click)="onSort('status')">
              Status
              <span class="text-slate-500">{{ getSortIcon('status') }}</span>
            </button>
          </th>
          <th class="px-4 py-3 text-left font-semibold text-slate-700">
            <button type="button" class="inline-flex items-center gap-1" (click)="onSort('createdAt')">
              Fecha
              <span class="text-slate-500">{{ getSortIcon('createdAt') }}</span>
            </button>
          </th>
          <th class="px-4 py-3 text-left font-semibold text-slate-700">Acciones</th>
        </tr>
      </thead>

      <tbody class="divide-y divide-slate-200 bg-white">
        <tr *ngIf="isLoading">
          <td colspan="4" class="px-4 py-2">
            <app-loading-state message="Cargando ad accounts..."></app-loading-state>
          </td>
        </tr>

        <tr *ngIf="!isLoading && adAccounts.length === 0">
          <td colspan="4" class="px-4 py-2">
            <app-empty-state></app-empty-state>
          </td>
        </tr>

        <tr *ngFor="let adAccount of adAccounts; trackBy: trackByAdAccount" class="hover:bg-slate-50">
          <td class="whitespace-nowrap px-4 py-3 text-slate-900">{{ adAccount.name }}</td>
          <td class="whitespace-nowrap px-4 py-3">
            <span
              class="inline-flex rounded-full px-2 py-1 text-xs font-medium"
              [ngClass]="{
                'bg-emerald-100 text-emerald-700': adAccount.status === 'ACTIVE',
                'bg-amber-100 text-amber-700': adAccount.status === 'PAUSED',
                'bg-slate-200 text-slate-700': adAccount.status !== 'ACTIVE' && adAccount.status !== 'PAUSED'
              }"
            >
              {{ adAccount.status }}
            </span>
          </td>
          <td class="whitespace-nowrap px-4 py-3 text-slate-700">
            {{ adAccount.createdAt ? (adAccount.createdAt | date: 'dd/MM/yyyy') : '—' }}
          </td>
          <td class="whitespace-nowrap px-4 py-3">
            <div class="flex flex-wrap gap-2">
              <button
                type="button"
                class="rounded-md border border-blue-300 px-3 py-1.5 text-xs font-medium text-blue-700 transition hover:bg-blue-50 disabled:cursor-not-allowed disabled:opacity-60"
                [disabled]="syncingAccountId === adAccount.id"
                (click)="onSync(adAccount)"
              >
                {{ syncingAccountId === adAccount.id ? 'Sincronizando...' : 'Sync' }}
              </button>
              <button
                type="button"
                class="rounded-md border border-slate-300 px-3 py-1.5 text-xs font-medium text-slate-700 transition hover:bg-slate-100"
                (click)="onViewDetail(adAccount)"
              >
                Ver detalle
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="mt-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
    <p class="text-sm text-slate-600">Total: {{ totalItems }} registros</p>

    <div class="flex items-center gap-1">
      <button
        type="button"
        class="rounded-md border border-slate-300 px-3 py-1.5 text-xs font-medium text-slate-700 transition hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="currentPage <= 1"
        (click)="onPageChange(currentPage - 1)"
      >
        Anterior
      </button>

      <ng-container *ngFor="let page of pageNumbers">
        <button
          type="button"
          class="rounded-md border px-3 py-1.5 text-xs font-medium transition"
          [ngClass]="
            page === currentPage
              ? 'border-blue-600 bg-blue-600 text-white'
              : 'border-slate-300 text-slate-700 hover:bg-slate-100'
          "
          (click)="onPageChange(page)"
        >
          {{ page }}
        </button>
      </ng-container>

      <button
        type="button"
        class="rounded-md border border-slate-300 px-3 py-1.5 text-xs font-medium text-slate-700 transition hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="currentPage >= totalPages"
        (click)="onPageChange(currentPage + 1)"
      >
        Siguiente
      </button>
    </div>
  </div>
</section>
