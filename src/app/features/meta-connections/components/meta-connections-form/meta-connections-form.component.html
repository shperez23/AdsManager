<section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm sm:p-6">
  <div class="mb-4 flex flex-wrap items-start justify-between gap-3">
    <div>
      <h2 class="text-lg font-semibold text-slate-900">
        {{ isEditMode ? 'Editar conexión Meta' : 'Crear conexión Meta' }}
      </h2>
      <p class="text-xs text-slate-500">
        Configura credenciales y token para sincronizar datos con Meta.
      </p>
    </div>

    <button
      *ngIf="isEditMode"
      type="button"
      class="rounded-md border border-slate-300 px-3 py-2 text-xs font-medium text-slate-700 transition hover:bg-slate-50"
      (click)="onCancel()"
    >
      Cancelar edición
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid gap-3 sm:grid-cols-2">
    <label class="flex flex-col gap-1 text-xs font-medium text-slate-700">
      App ID
      <input
        formControlName="appId"
        class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal"
        placeholder="123456789"
      />
    </label>

    <label class="flex flex-col gap-1 text-xs font-medium text-slate-700">
      ID del negocio
      <input
        formControlName="businessId"
        class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal"
        placeholder="Meta ID del negocio"
      />
    </label>

    <label class="flex flex-col gap-1 text-xs font-medium text-slate-700 sm:col-span-2">
      Secreto de la aplicación
      <input
        formControlName="appSecret"
        class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal"
        placeholder="Secreto de la aplicación"
      />
    </label>

    <label class="flex flex-col gap-1 text-xs font-medium text-slate-700 sm:col-span-2">
      Token de acceso
      <textarea
        formControlName="accessToken"
        rows="2"
        class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal"
        placeholder="Token de acceso"
      ></textarea>
    </label>

    <label class="flex flex-col gap-1 text-xs font-medium text-slate-700 sm:col-span-2">
      Token de actualización
      <textarea
        formControlName="refreshToken"
        rows="2"
        class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal"
        placeholder="Token de actualización"
      ></textarea>
    </label>

    <label class="flex flex-col gap-1 text-xs font-medium text-slate-700">
      Vencimiento del token
      <input
        formControlName="tokenExpiration"
        type="datetime-local"
        class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-normal"
      />
    </label>

    <button
      type="submit"
      class="rounded-md bg-blue-600 px-4 py-2 text-sm text-white disabled:cursor-not-allowed disabled:bg-blue-300"
      [disabled]="isSubmitting"
    >
      {{ isSubmitting ? 'Guardando...' : isEditMode ? 'Actualizar conexión' : 'Crear conexión' }}
    </button>
  </form>
</section>
