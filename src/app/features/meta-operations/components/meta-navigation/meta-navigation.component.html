<section class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm sm:p-6">
  <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
    <div>
      <div
        class="inline-flex items-center gap-2 rounded-full border border-fuchsia-200 bg-fuchsia-50 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-fuchsia-700"
      >
        Operaciones Meta
      </div>
      <h2 class="mt-3 text-2xl font-semibold text-slate-900">Operación Meta end-to-end</h2>
      <p class="mt-1 text-sm text-slate-600">
        Interfaz conectada a los endpoints Meta ya existentes en <code>MetaService</code>.
      </p>
    </div>

    <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-600">
      Evita IDs manuales usando selectores enlazados a la API.
    </div>
  </div>

  <nav class="mt-5 grid gap-3 md:grid-cols-2 xl:grid-cols-5">
    <a
      *ngFor="let link of links"
      [routerLink]="link.route"
      routerLinkActive="border-fuchsia-400 bg-fuchsia-50 text-fuchsia-700 shadow-sm"
      class="rounded-2xl border border-slate-200 px-4 py-3 transition hover:border-fuchsia-200 hover:bg-fuchsia-50/60"
    >
      <p class="text-sm font-semibold">{{ link.label }}</p>
      <p class="mt-1 text-xs text-slate-500">{{ link.description }}</p>
    </a>
  </nav>
</section>
