<div class="space-y-6">
  <app-meta-navigation></app-meta-navigation>

  <form
    [formGroup]="form"
    class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm sm:p-6"
    (ngSubmit)="onSubmit()"
  >
    <div class="mb-4">
      <h3 class="text-lg font-semibold text-slate-900">Crear Meta ad set</h3>
      <p class="text-sm text-slate-600">
        Flujo conectado a <code>POST /meta/ad-accounts/&#123;id&#125;/adsets</code> con cuenta y
        campaign reales.
      </p>
    </div>

    <app-error-state
      *ngIf="errorMessage"
      class="mb-4 block"
      [message]="errorMessage"
    ></app-error-state>
    <div *ngIf="isLoadingAccounts || isLoadingCampaigns" class="mb-4">
      <app-loading-state message="Cargando selectores Meta..."></app-loading-state>
    </div>

    <div class="grid gap-4 lg:grid-cols-2">
      <label class="block">
        <span class="mb-1.5 block text-sm font-medium text-slate-700">Meta Ad Account</span>
        <select
          formControlName="adAccountId"
          class="w-full rounded-2xl border border-slate-300 px-3 py-2.5 text-sm"
        >
          <option value="">Selecciona una cuenta</option>
          <option *ngFor="let account of accounts" [value]="account.id">{{ account.name }}</option>
        </select>
      </label>

      <label class="block">
        <span class="mb-1.5 block text-sm font-medium text-slate-700">Campaign</span>
        <select
          formControlName="campaignId"
          class="w-full rounded-2xl border border-slate-300 px-3 py-2.5 text-sm"
        >
          <option value="">Selecciona una campaign</option>
          <option *ngFor="let campaign of campaigns" [value]="campaign.id">
            {{ campaign.name }}
          </option>
        </select>
      </label>

      <label class="block lg:col-span-2">
        <span class="mb-1.5 block text-sm font-medium text-slate-700">Nombre</span>
        <input
          formControlName="name"
          type="text"
          class="w-full rounded-2xl border border-slate-300 px-3 py-2.5 text-sm"
        />
      </label>

      <label class="block">
        <span class="mb-1.5 block text-sm font-medium text-slate-700">Status</span>
        <select
          formControlName="status"
          class="w-full rounded-2xl border border-slate-300 px-3 py-2.5 text-sm"
        >
          <option value="ACTIVE">ACTIVE</option>
          <option value="PAUSED">PAUSED</option>
        </select>
      </label>

      <label class="block">
        <span class="mb-1.5 block text-sm font-medium text-slate-700">Daily budget</span>
        <input
          formControlName="dailyBudget"
          type="number"
          min="0"
          class="w-full rounded-2xl border border-slate-300 px-3 py-2.5 text-sm"
        />
      </label>

      <label class="block">
        <span class="mb-1.5 block text-sm font-medium text-slate-700">Billing event</span>
        <input
          formControlName="billingEvent"
          type="text"
          class="w-full rounded-2xl border border-slate-300 px-3 py-2.5 text-sm"
          placeholder="IMPRESSIONS"
        />
      </label>

      <label class="block">
        <span class="mb-1.5 block text-sm font-medium text-slate-700">Optimization goal</span>
        <input
          formControlName="optimizationGoal"
          type="text"
          class="w-full rounded-2xl border border-slate-300 px-3 py-2.5 text-sm"
          placeholder="REACH"
        />
      </label>

      <label class="block lg:col-span-2">
        <span class="mb-1.5 block text-sm font-medium text-slate-700">Targeting JSON</span>
        <textarea
          formControlName="targetingJson"
          rows="5"
          class="w-full rounded-2xl border border-slate-300 px-3 py-2.5 text-sm"
          placeholder='&#123;"geo_locations":&#123;"countries":["US"]&#125;&#125;'
        ></textarea>
      </label>
    </div>

    <div class="mt-5 flex justify-end">
      <button
        type="submit"
        class="rounded-2xl bg-fuchsia-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-fuchsia-500 disabled:opacity-60"
        [disabled]="isSubmitting"
      >
        {{ isSubmitting ? 'Creando...' : 'Crear ad set' }}
      </button>
    </div>
  </form>
</div>
