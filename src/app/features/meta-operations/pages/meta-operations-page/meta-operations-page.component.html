<div class="space-y-6">
  <app-meta-navigation></app-meta-navigation>

  <section class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm sm:p-6">
    <div class="mb-4 flex items-center justify-between gap-3">
      <div>
        <h3 class="text-lg font-semibold text-slate-900">Cuentas publicitarias de Meta</h3>
        <p class="text-sm text-slate-600">
          Listado operativo desde <code>GET /meta/ad-accounts</code>.
        </p>
      </div>
      <button
        type="button"
        class="rounded-2xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-50"
        (click)="onRetry()"
      >
        Recargar
      </button>
    </div>

    <app-error-state
      *ngIf="errorMessage"
      class="mb-4 block"
      [message]="errorMessage"
      [showRetry]="true"
      (retry)="onRetry()"
    ></app-error-state>

    <div *ngIf="isLoading">
      <app-loading-state message="Cargando cuentas Meta..."></app-loading-state>
    </div>

    <div *ngIf="!isLoading && !adAccounts.length && !errorMessage">
      <app-empty-state
        title="Sin cuentas Meta"
        description="No se devolvieron cuentas desde la conexión Meta actual."
      ></app-empty-state>
    </div>

    <div *ngIf="!isLoading && adAccounts.length" class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
      <article
        *ngFor="let account of adAccounts; trackBy: trackByAccount"
        class="rounded-3xl border border-slate-200 bg-slate-50 p-5"
      >
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-lg font-semibold text-slate-900">{{ account.name || account.id }}</p>
            <p class="mt-1 text-xs text-slate-500">{{ account.id }}</p>
          </div>
          <span
            class="rounded-full bg-emerald-100 px-2.5 py-1 text-xs font-semibold text-emerald-700"
            >{{ account.status || 'UNKNOWN' }}</span
          >
        </div>
        <dl class="mt-4 space-y-2 text-sm text-slate-600">
          <div class="flex justify-between gap-3">
            <dt>Moneda</dt>
            <dd>{{ account.currency || '—' }}</dd>
          </div>
          <div class="flex justify-between gap-3">
            <dt>Zona horaria</dt>
            <dd>{{ account.timezone || '—' }}</dd>
          </div>
          <div class="flex justify-between gap-3">
            <dt>ID del negocio</dt>
            <dd>{{ account.businessId || '—' }}</dd>
          </div>
        </dl>
      </article>
    </div>
  </section>
</div>
