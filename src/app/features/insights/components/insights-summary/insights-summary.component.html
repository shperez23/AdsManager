<section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm sm:p-6">
  <div class="flex flex-wrap items-end gap-3">
    <div>
      <label class="block text-xs text-slate-600">Desde</label>
      <input [(ngModel)]="startDate" [max]="endDate" type="date" class="rounded-lg border border-slate-300 px-3 py-2 text-sm" />
    </div>
    <div>
      <label class="block text-xs text-slate-600">Hasta</label>
      <input [(ngModel)]="endDate" [max]="today" type="date" class="rounded-lg border border-slate-300 px-3 py-2 text-sm" />
    </div>
    <button class="rounded-lg bg-blue-600 px-4 py-2 text-sm text-white" (click)="onApply()">Aplicar</button>
  </div>

  <p *ngIf="errorMessage" class="mt-3 text-sm text-red-600">{{ errorMessage }}</p>
  <p *ngIf="isLoading" class="mt-3 text-sm text-slate-500">Cargando...</p>

  <div class="mt-4 grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
    <article class="rounded-lg border border-slate-200 p-3">
      <p class="text-xs text-slate-500">Filas</p>
      <p class="text-lg font-semibold text-slate-900">{{ rows.length }}</p>
    </article>
    <article class="rounded-lg border border-slate-200 p-3">
      <p class="text-xs text-slate-500">Gasto</p>
      <p class="text-lg font-semibold text-slate-900">{{ totalSpend | number: '1.0-2' }}</p>
    </article>
  </div>
</section>
